services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: pms-web-prod
    ports:
      - "${APP_PORT:-6009}:8000"
    env_file:
      - .env
    volumes:
      # Persists SQLite when using SQLITE_DB_PATH=/app/dbdata/db.sqlite3 in .env
      - ./sqlite-data:/app/dbdata
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)\" || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
