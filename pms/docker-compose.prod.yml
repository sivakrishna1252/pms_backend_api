services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: pms-web-prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)\" || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
